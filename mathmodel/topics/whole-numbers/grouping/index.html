  keyQuestions: [
    'What happens when we assume all items are one type?',
    'How do we calculate the excess or shortage from our assumption?',

    'Can this method work when items have more than two types?',

  glossary: [
    { term: 'Assumption Method', def: 'A strategy where you assume all items are one type, then calculate the excess or shortage and adjust to find how many of each type there actually are.' },
    { term: 'Excess', def: 'The amount that is too much when your assumption overshoots the actual total value.' },
    { term: 'Shortage', def: 'The amount that is too little when your assumption undershoots the actual total value.' },
    { term: 'Difference per Item', def: 'The difference in value (e.g., legs, points, cents) between the two types of items. Used to find how many items need to be swapped from the assumed type.' },
    { term: 'Grouping Problem', def: 'A problem where you know the total number of items AND the total value, and must find how many of each type there are.' },
    { term: 'Total Count', def: 'The total number of items of all types combined.' },
    { term: 'Total Value', def: 'The combined value contributed by all items (e.g., total legs, total score, total money).' }
  ],

  notes: [
    {
      heading: 'What is a Grouping / Number-and-Value Problem?',
      content: `<p>In a grouping problem, you are given <strong>two pieces of information</strong>:</p>
      <ol>
        <li>The <strong>total number</strong> of items (e.g., 20 animals)</li>
        <li>The <strong>total value</strong> produced by those items (e.g., 56 legs)</li>
      </ol>
      <p>There are <strong>two types</strong> of items, each contributing a different value. Your job is to find how many of each type there are.</p>
      <p>Common contexts include:</p>
      <ul>
        <li><strong>Animals:</strong> Chickens (2 legs) and rabbits (4 legs)</li>
        <li><strong>Coins:</strong> 20-cent coins and 50-cent coins</li>
        <li><strong>Quiz scoring:</strong> +4 for correct, −1 for wrong</li>
        <li><strong>Vehicles:</strong> Bicycles (2 wheels) and cars (4 wheels)</li>
      </ul>`,
      highlights: [
        'Two knowns: total count + total value. Two unknowns: how many of each type.',
        'Each type contributes a different value per item — this difference is the key to solving.'
      ]
    },
    {
      heading: 'The Assumption Method — Step by Step',
      content: `<p>The Assumption Method is a powerful strategy for solving grouping problems without algebra:</p>
      <ol>
        <li><strong>Assume</strong> all items are <em>one type</em> (usually the type with the smaller value).</li>
        <li><strong>Calculate</strong> the total value under this assumption.</li>
        <li><strong>Find the excess or shortage</strong> — compare the assumed total with the actual total.</li>
        <li><strong>Find the difference per item</strong> — how much extra (or less) does each swap contribute?</li>
        <li><strong>Divide</strong> the excess/shortage by the difference per item to find how many of the other type there are.</li>
        <li><strong>Subtract</strong> from the total count to find the remaining type.</li>
      </ol>`,
      highlights: [
        'Step formula: Number of Type B = Excess ÷ Difference per item',
        'Always check: Count of Type A + Count of Type B = Total Count, and values add up to Total Value.'
      ],
      equations: [
        'Assumed total = Total count × Value of assumed type',
        'Excess (or Shortage) = |Assumed total − Actual total|',
        'Number of other type = Excess ÷ (Difference in value per item)',
        'Number of assumed type = Total count − Number of other type'
      ]
    },
    {
      heading: 'Using Bar Models for Grouping Problems',
      content: `<p>The bar model for a grouping problem shows the <strong>assumed total</strong> and the <strong>actual total</strong>, making the excess visible.</p>
      <ul>
        <li>Draw one bar for the <strong>assumed total</strong> (e.g., all chickens → 20 × 2 = 40 legs).</li>
        <li>Draw another bar (or mark) for the <strong>actual total</strong> (e.g., 56 legs).</li>
        <li>The <strong>difference between these bars</strong> is the excess/shortage.</li>
        <li>Each "swap" from the assumed type to the other type changes the value by a fixed amount — this is shown as equal parts in the difference.</li>
      </ul>
      <p>The number of equal parts that fit into the excess tells you how many items are of the other type.</p>`,
      highlights: [
        'The gap between the assumed bar and the actual bar = the total excess.',
        'Divide the gap into equal parts (each = difference per item) to find the count.'

      heading: 'Variations: Scoring, Coins, and Vehicles',

      highlights: [
        'For scoring problems with penalties, the difference per item = points for correct + penalty for wrong (since swapping changes both).'

        'Number of 50-cent coins = $3.50 ÷ $0.50 = <strong>7</strong>',

    {
