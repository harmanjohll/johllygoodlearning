      content: `<p>A comparison model uses <strong>two bars</strong> drawn one above the other, both starting from the same left edge. The bars represent two quantities, and the <strong>difference</strong> between them is clearly visible as the gap between the end of the shorter bar and the end of the longer bar.</p>
      <p>This model helps you see three key relationships at a glance:</p>
      <ul>
        <li>The <strong>larger</strong> quantity (longer bar)</li>
        <li>The <strong>smaller</strong> quantity (shorter bar)</li>
        <li>The <strong>difference</strong> between them (the gap)</li>

        'Key relationship: Larger = Smaller + Difference. Rearranging: Smaller = Larger - Difference. Difference = Larger - Smaller.'

        <li><strong>Draw the shorter bar</strong> directly below, aligned on the left. Label it.</li>
        <li><strong>Mark the difference</strong> — the gap between the end of the shorter bar and the end of the longer bar.</li>
        <li><strong>Label known values</strong> with numbers and unknowns with <strong>?</strong></li>
