      heading: 'What are Repeated Quantities?',
      content: `<p>In repeated-quantity problems, one quantity is described as a <strong>multiple</strong> of another. For example, "Ali has 3 times as many marbles as Ben" means Ali's amount is <strong>3 equal groups</strong>, each group the same size as Ben's amount.</p>
      <p>We draw this by making Ben's bar <strong>1 unit</strong> and Ali's bar <strong>3 units</strong> of the same size.</p>
      <ul>
        <li>The <strong>smaller</strong> quantity is drawn as 1 unit.</li>
        <li>The <strong>larger</strong> quantity is drawn as N units (the multiple).</li>
        <li>All units are <strong>equal in value</strong>.</li>

        <li><strong>Draw the larger bar</strong> as N equal units (same size as the small bar's unit). Label it.</li>
        <li><strong>Label known values</strong> with numbers and unknowns with <strong>?</strong></li>
        <li><strong>Find the value of 1 unit</strong> using the known information.</li>
