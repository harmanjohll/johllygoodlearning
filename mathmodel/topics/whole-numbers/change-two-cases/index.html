    { term: 'Difference Between Cases', def: 'The change in quantity or cost that results from the difference in conditions between the two cases.' },
    { term: 'Unit Value', def: 'The value of one single item, found by dividing the total difference by the number of extra items.' },
    { term: '"Money left over"', def: 'Signals that the total amount of money is MORE than the cost. Total = Cost + Leftover.' },

  notes: [
    {
      heading: 'What Are Two-Case Problems?',
      content: `<p>In a two-case problem, you are given <strong>two different scenarios</strong> involving the same person or situation. The key insight is that something <strong>stays the same</strong> across both cases (like the amount of money a person has), while something else <strong>changes</strong> (like the number of items bought).</p>
      <p>By comparing the two cases side by side, you can <strong>isolate and find the value of the changing element</strong>.</p>
      <p>Common setups include:</p>
      <ul>
        <li>Buying different quantities of the same item with the same amount of money</li>
        <li>Two purchases with the same common items but different extras</li>
        <li>Different combinations of items totalling different amounts</li>
      </ul>`,

      <ol>
        <li><strong>Write out both cases clearly.</strong> Identify the items and amounts in each case.</li>
        <li><strong>Find the common element.</strong> What is the same in both cases? (e.g., same number of notebooks)</li>
        <li><strong>Find the difference.</strong> What changed between the two cases? How many more/fewer items, and how much more/less money?</li>
        <li><strong>Calculate the unit value.</strong> Divide the difference in total cost by the difference in number of items.</li>
