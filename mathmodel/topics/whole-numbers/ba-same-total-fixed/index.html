    { term: 'Before-and-After Model', def: 'A bar model that shows two states: the original quantities (before) and the changed quantities (after) side by side.' },

    {
      heading: 'What Is "Same Total with Fixed Quantities"?',
      content: `<p>In these problems, several people share a collection of items. The <strong>total number of items stays the same</strong> because nothing is added or removed from the group. However, some people's amounts <strong>do not change</strong> (they are "fixed"), while others give or receive items among themselves.</p>
      <p>For example, if 3 children share 90 marbles and Child C's amount stays the same, then any marbles that Child A gives away must go to Child B. The total remains 90, and Child C's share is untouched.</p>
      <ul>
        <li>Total before = Total after (nothing enters or leaves)</li>
        <li>The fixed person's amount: same in both states</li>
        <li>The change happens only between the non-fixed people</li>
      </ul>`,

      equations: [
        'Total = Fixed + Changing quantities',
        'Sub-total of changing quantities (before) = Sub-total of changing quantities (after)'

        <li><strong>Draw "Before" bars</strong> for each person, showing their starting amounts.</li>

        <li><strong>The fixed person's bar</strong> should be the same length in both states.</li>
        <li><strong>Show the transfer</strong> — the amount that moved from one person to another. One bar gets shorter, the other gets longer by the same amount.</li>
        <li><strong>Label all known values</strong> and mark unknowns with "?".</li>

        <li><strong>Work backwards</strong> if needed: since you know the transfer amount, find the "before" values.</li>
