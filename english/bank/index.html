<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bank — PSLE English Studio</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { padding: 0; }
    .page-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .85rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .back-link { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 7px; padding: .35rem .75rem; font-size: .8rem; cursor: pointer; font-weight: 600; text-decoration: none; }
    .back-link:hover { background: var(--border); color: var(--text); }
    main { max-width: 820px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }

    .hero h1 { font-size: 1.55rem; margin-bottom: .25rem; }
    .hero p  { color: var(--muted); font-size: .92rem; line-height: 1.65; margin-bottom: 1.25rem; }

    .tabs { display: flex; gap: .4rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .tab {
      background: transparent; border: 0; padding: .55rem .85rem;
      color: var(--muted); font-size: .88rem; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .panel { display: none; }
    .panel.active { display: block; }

    .empty { color: var(--muted); font-size: .9rem; padding: 1.5rem 0; text-align: center; line-height: 1.65; }
    .empty a { color: var(--accent); text-decoration: none; }

    .patterns {
      background: linear-gradient(135deg, #14302b 0%, #1e1835 100%);
      border: 1px solid var(--accent); border-radius: 11px;
      padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    .patterns h4 { color: var(--accent); font-size: .85rem; margin-bottom: .5rem; }
    .patterns .row { display: flex; gap: .35rem; flex-wrap: wrap; }
    .patterns .chip { font-size: .76rem; padding: .2rem .55rem; border-radius: 99px; background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .patterns .chip.hot { background: rgba(248,113,113,.08); border-color: #f87171; color: #f87171; }
    .patterns .footnote { font-size: .78rem; color: var(--muted); margin-top: .55rem; line-height: 1.55; }

    .essay-card, .word-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.25rem; margin-bottom: .85rem;
    }
    .essay-card .head, .word-card .head { display: flex; gap: .55rem; align-items: baseline; flex-wrap: wrap; margin-bottom: .4rem; }
    .essay-card .head .task-tag { font-size: .65rem; padding: .15rem .55rem; border-radius: 99px; background: rgba(96,165,250,.08); color: var(--comprehension,#60a5fa); border: 1px solid var(--comprehension,#60a5fa); font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
    .essay-card .head .when, .word-card .head .when { font-size: .72rem; color: var(--muted); }
    .essay-card .head .ic { font-size: .72rem; color: var(--muted); }
    .essay-card .topic, .word-card .word { font-size: 1rem; font-weight: 700; color: var(--text); }
    .essay-card .summary-row { display: flex; gap: .3rem; flex-wrap: wrap; margin-top: .45rem; }
    .essay-card .ann-chip { font-size: .68rem; padding: .15rem .55rem; border-radius: 99px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

    .essay-card details summary, .word-card details summary { cursor: pointer; color: var(--accent); font-size: .82rem; margin-top: .55rem; }
    .essay-card .draft-body, .word-card .def {
      margin-top: .65rem; padding: .65rem .85rem;
      background: var(--surface); border-left: 3px solid var(--accent); border-radius: 6px;
      font-size: .88rem; line-height: 1.65; color: var(--text); white-space: pre-wrap;
    }
    .essay-card .issue-list { margin-top: .65rem; font-size: .82rem; color: var(--text); line-height: 1.55; }
    .essay-card .issue-list li { margin-bottom: .35rem; }

    .actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .65rem; }
    .danger { background: transparent; border: 1px solid #f87171; color: #f87171; padding: .3rem .7rem; border-radius: 6px; font-size: .76rem; cursor: pointer; }
    .danger:hover { background: rgba(248,113,113,.06); }

    .word-card .pos { font-size: .68rem; padding: .12rem .55rem; background: rgba(74,222,128,.08); border: 1px solid var(--accent); color: var(--accent); border-radius: 99px; font-weight: 700; text-transform: lowercase; }
    .word-card .def { white-space: normal; }
  </style>
</head>
<body>

<header class="page-header">
  <a href="../" class="back-link">← Hub</a>
  <strong style="color: var(--text);">My Bank</strong>
  <span style="color: var(--muted); font-size: .82rem;">Saved vocab cards + annotated essays</span>
</header>

<main>
  <div class="hero">
    <h1>My Bank</h1>
    <p>
      Two stacks of personal study material that live on this device only. Vocab cards from <a href="../word-lab/" style="color:var(--accent);">Word Lab</a> and annotated essays saved from the <a href="../structured/" style="color:var(--accent);">Composition Builder</a>. Browse, expand, prune.
    </p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="essays">Annotated essays</button>
    <button class="tab" data-tab="words">Vocab cards</button>
  </div>

  <div class="panel active" id="panel-essays"></div>
  <div class="panel" id="panel-words"></div>
</main>

<script src="../shared.js"></script>
<script src="../shared/storage.js"></script>
<script>
const ANN_KEY  = 'jgl.english.annotator.bank';
const WORD_KEY = 'jgl.english.wordlab.bank';

const ANN_TYPE_COLOUR = {
  Tense: '#fb7185', SVA: '#fbbf24', Article: '#a78bfa', Preposition: '#60a5fa', Pronoun: '#f59e0b',
  WordChoice: '#34d399', Collocation: '#22d3ee', Cliche: '#f87171', Repetition: '#facc15',
  ShowDontTell: '#f472b6', Punctuation: '#94a3b8', OK: '#4ade80',
};

function loadAnn()  { try { return JSON.parse(localStorage.getItem(ANN_KEY)  || '[]'); } catch { return []; } }
function loadWord() { try { return JSON.parse(localStorage.getItem(WORD_KEY) || '[]'); } catch { return []; } }
function saveAnn(b)  { try { localStorage.setItem(ANN_KEY,  JSON.stringify(b)); } catch {} }
function saveWord(b) { try { localStorage.setItem(WORD_KEY, JSON.stringify(b)); } catch {} }

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + t.dataset.tab));
}));

renderEssays();
renderWords();

function renderEssays() {
  const host = document.getElementById('panel-essays');
  const bank = loadAnn().slice().reverse();
  if (!bank.length) {
    host.innerHTML = `<div class="empty">No annotated essays saved yet. Run the <a href="../structured/">Annotator</a> mode on a draft, then click "Save to Bank".</div>`;
    return;
  }
  // Patterns roll-up: top 3 most-flagged error types across all saved essays
  const totals = {};
  bank.forEach(e => {
    Object.entries(e.counts || {}).forEach(([type, n]) => {
      if (type === 'OK') return;
      totals[type] = (totals[type] || 0) + n;
    });
  });
  const ranked = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const topThree = ranked.slice(0, 3);

  const patternsHTML = topThree.length ? `
    <div class="patterns">
      <h4>📊 Patterns across ${bank.length} saved draft${bank.length === 1 ? '' : 's'}</h4>
      <div class="row">
        ${topThree.map(([t, n]) => `<span class="chip hot">${t} · ${n}</span>`).join('')}
        ${ranked.slice(3).slice(0, 4).map(([t, n]) => `<span class="chip">${t} · ${n}</span>`).join('')}
      </div>
      <div class="footnote">These are the categories the Annotator has flagged most often in your saved work. Focus the next session on the top one.</div>
    </div>
  ` : '';

  const cardsHTML = bank.map((e, idx) => {
    const date = new Date(e.savedAtIso).toLocaleDateString('en-SG', { month: 'short', day: 'numeric' });
    const ordered = Object.entries(e.counts || {}).sort((a, b) => b[1] - a[1]).filter(([t]) => t !== 'OK');
    return `
      <div class="essay-card" data-id="${escapeAttr(e.id)}">
        <div class="head">
          <span class="task-tag">${escapeHTML(e.task || 'composition')}</span>
          <span class="when">${date}</span>
          <span class="ic">· ${e.issueCount || 0} issue${e.issueCount === 1 ? '' : 's'}</span>
        </div>
        <div class="topic">${escapeHTML(e.task === 'comprehension' ? (e.question || '(comprehension answer)') : (e.topic || '(no topic)'))}</div>
        <div class="summary-row">
          ${ordered.map(([t, n]) => `<span class="ann-chip" style="border-color:${ANN_TYPE_COLOUR[t] || 'var(--border)'};color:${ANN_TYPE_COLOUR[t] || 'var(--muted)'};">${t} · ${n}</span>`).join('')}
        </div>
        <details>
          <summary>Show the draft + every annotation</summary>
          <div class="draft-body">${escapeHTML(e.draft || '')}</div>
          ${renderIssueList(e)}
        </details>
        <div class="actions">
          <button class="danger" data-action="delete">Delete</button>
        </div>
      </div>
    `;
  }).join('');

  host.innerHTML = patternsHTML + cardsHTML;
  host.querySelectorAll('.essay-card').forEach(card => {
    const id = card.dataset.id;
    const del = card.querySelector('[data-action="delete"]');
    if (del) del.addEventListener('click', () => {
      if (!confirm('Delete this annotated essay from your Bank?')) return;
      const bank = loadAnn().filter(x => x.id !== id);
      saveAnn(bank);
      renderEssays();
    });
  });
}

function renderIssueList(e) {
  const issues = (e.annotations || []).filter(a => a.type && a.type !== 'OK' && (a.issue || a.suggestion));
  if (!issues.length) return '<div class="issue-list" style="color:var(--grammar);">Every sentence checked out on this draft.</div>';
  return `<ol class="issue-list">${issues.map(a => `
    <li><strong style="color:${ANN_TYPE_COLOUR[a.type] || 'var(--accent)'};">${escapeHTML(a.type)}</strong>${a.sentence ? ' — "' + escapeHTML(a.sentence) + '"' : ''}${a.suggestion ? '<br><span style="color:var(--muted);">Fix: ' + escapeHTML(a.suggestion) + '</span>' : ''}</li>
  `).join('')}</ol>`;
}

function renderWords() {
  const host = document.getElementById('panel-words');
  const bank = loadWord().slice().reverse();
  if (!bank.length) {
    host.innerHTML = `<div class="empty">No vocab cards saved yet. Open <a href="../word-lab/">Word Lab</a>, paste a word, and tap "📌 Save to bank".</div>`;
    return;
  }
  host.innerHTML = bank.map(c => `
    <div class="word-card" data-w="${escapeAttr(c.word)}">
      <div class="head">
        <span class="word">${escapeHTML(c.word)}</span>
        <span class="pos">${escapeHTML(c.partOfSpeech || '')}</span>
        <span class="when">${escapeHTML(c.frequency || '')} · ${escapeHTML(c.register || '')}</span>
        ${c.savedAt ? `<span class="when">· saved ${new Date(c.savedAt).toLocaleDateString('en-SG', { month: 'short', day: 'numeric' })}</span>` : ''}
      </div>
      <div class="def">${escapeHTML(c.definition || '')}</div>
      <details>
        <summary>Show template, examples, collocations</summary>
        <div class="def" style="margin-top:.4rem;"><strong>Template:</strong> ${escapeHTML(c.template || '')}</div>
        <div class="def"><strong>Examples:</strong><br>${(c.examples || []).map(escapeHTML).join('<br>')}</div>
        <div class="def"><strong>Collocations:</strong> ${(c.collocations || []).map(escapeHTML).join(' · ')}</div>
        ${c.sdt ? `<div class="def" style="border-left-color:#fb7185;"><strong>Show, don't tell:</strong><br><span style="color:#f87171;">${escapeHTML(c.sdt.telling || '')}</span><br><span style="color:#4ade80;">${escapeHTML(c.sdt.showing || '')}</span></div>` : ''}
      </details>
      <div class="actions">
        <button class="danger" data-action="delete">Delete</button>
      </div>
    </div>
  `).join('');
  host.querySelectorAll('.word-card').forEach(card => {
    const word = card.dataset.w;
    const del = card.querySelector('[data-action="delete"]');
    if (del) del.addEventListener('click', () => {
      if (!confirm('Remove "' + word + '" from your Bank?')) return;
      const bank = loadWord().filter(x => x.word !== word);
      saveWord(bank);
      renderWords();
    });
  });
}

function escapeHTML(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return String(s == null ? '' : s).replace(/["'<>]/g, ''); }
</script>
</body>
</html>
