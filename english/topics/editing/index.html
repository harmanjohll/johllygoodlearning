<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editing — PSLE English</title>
<link rel="stylesheet" href="../../style.css">
<style>
  .topic-shell { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
  .topic-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .topic-header-text { flex: 1; min-width: 280px; }
  .topic-header h1 { font-size: 1.6rem; margin-bottom: .25rem; }
  .topic-header-blurb { font-size: .9rem; color: var(--muted); }
  .topic-back { display: inline-flex; align-items: center; gap: .35rem; padding: .4rem .85rem; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); text-decoration: none; font-size: .82rem; transition: all .15s; }
  .topic-back:hover { color: var(--accent); border-color: var(--accent); }
  .topic-meta { display: flex; gap: .4rem; align-items: center; }
</style>
</head>
<body>
  <div class="topic-shell">
    <a class="topic-back" href="../../index.html">← Hub</a>
    <header class="topic-header" style="margin-top:1rem;">
      <div class="topic-header-text">
        <h1 id="topic-title">Editing for Spelling &amp; Grammar</h1>
        <p class="topic-header-blurb" id="topic-blurb">Loading…</p>
      </div>
      <div class="topic-meta">
        <span class="badge" id="topic-theme-badge">comprehension</span>
        <span data-studio-settings-slot></span>
      </div>
    </header>

    <div class="tabs-root">
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-learn">📘 Learn</button>
        <button class="tab-btn" data-tab="tab-drill">🎯 Drill</button>
        <button class="tab-btn" data-tab="tab-quiz">📝 Quiz</button>
        <button class="tab-btn" data-tab="tab-mindmap">🗺 Mind Map</button>
      </div>

      <div id="tab-learn" class="tab-pane active">
        <div class="cornell-wrapper">
          <div class="cornell-cue">
            <div id="key-questions" style="margin-bottom:1.25rem;"></div>
            <div id="glossary"></div>
          </div>
          <div class="cornell-main">
            <div id="learn-content"></div>
            <div id="psle-prompts" style="margin-top:1.5rem;"></div>
          </div>
          <div id="summary"></div>
        </div>
      </div>

      <div id="tab-drill" class="tab-pane"><div id="drill-container"></div></div>
      <div id="tab-quiz" class="tab-pane"><div id="quiz-container"></div></div>
      <div id="tab-mindmap" class="tab-pane"><div id="mindmap-host"></div></div>
    </div>
  </div>

  <script>window.ENGLISH_TOPIC_ID = 'editing';</script>
  <script src="../../shared.js"></script>
  <script src="../../shared/storage.js"></script>
  <script src="../../shared/gemini.js"></script>
  <script src="../../shared/coach.js"></script>
  <script src="../../shared/content.js"></script>
  <script src="../../shared/streak.js"></script>
  <script src="../../shared/spaced.js"></script>
  <script src="../../shared/lab.js"></script>
  <script src="../../shared/english-topic.js"></script>
</body>
</html>
